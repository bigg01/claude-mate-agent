# GitHub Actions workflow: on-demand Claude Code task
#
# Save as .github/workflows/on-demand.yml (or copy from .github/workflows/on-demand.yml).
# Required repository secrets:
#   ANTHROPIC_API_KEY — must be set in repository or environment secrets
#
# Trigger: Actions → On-Demand Agent → Run workflow

name: On-Demand Claude Code Task

on:
  workflow_dispatch:
    inputs:
      task:
        description: Claude Code task prompt
        required: true
      image_tag:
        description: Agent image tag
        required: false
        default: latest
      team_mate_role:
        description: Team mate role for audit trail
        required: false
        default: operations
        type: choice
        options: [operations, security, sre, architect]
      timeout_seconds:
        description: Task timeout (seconds)
        required: false
        default: "1800"

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}/claude-mate-agent

jobs:
  run-task:
    name: "${{ github.event.inputs.task }}"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: on-demand   # optional: use a GitHub environment for ANTHROPIC_API_KEY

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code task
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -e CLAUDE_TASK="${{ github.event.inputs.task }}" \
            -e OPERATING_MODE=on-demand \
            -e TEAM_MATE_ROLE="${{ github.event.inputs.team_mate_role }}" \
            -e CLAUDE_TIMEOUT_SECONDS="${{ github.event.inputs.timeout_seconds }}" \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_RUN_ID="${{ github.run_id }}" \
            -e GITHUB_JOB="${{ github.job }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            -e GITHUB_ACTOR="${{ github.actor }}" \
            -e GITHUB_WORKFLOW="${{ github.workflow }}" \
            -e RUNNER_NAME="${{ runner.name }}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.event.inputs.image_tag }}" \
            --once
