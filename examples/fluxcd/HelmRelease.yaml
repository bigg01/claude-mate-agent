apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: claude-mate-agent
  namespace: claude-mate
spec:
  interval: 10m
  timeout: 5m

  chart:
    spec:
      chart: claude-mate-agent
      version: ">=0.1.0 <1.0.0"     # semver range; pin to exact version for production
      sourceRef:
        kind: HelmRepository
        name: claude-mate-agent
        namespace: flux-system
      interval: 10m

  # Rollback on failed upgrade
  upgrade:
    remediation:
      retries: 3
  rollback:
    timeout: 3m
    cleanupOnFail: true

  # Reference an existing Secret for the Anthropic API key.
  # Create with:
  #   kubectl create secret generic claude-mate-api-key \
  #     --namespace claude-mate \
  #     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
  valuesFrom:
    - kind: Secret
      name: claude-mate-helm-values
      optional: true

  values:
    replicaCount: 2

    image:
      repository: ghcr.io/your-org/claude-mate-agent
      tag: "1.0.0"     # managed by Flux image automation or set manually

    claudeCode:
      apiKeySecretName: claude-mate-api-key

    serviceMonitor:
      enabled: true
      labels:
        release: prometheus

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    networkPolicy:
      enabled: true
