global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/dora_rules.yml

scrape_configs:
  - job_name: claude-mate-agent
    static_configs:
      - targets:
          - agent:8080
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Pushgateway holds DORA + pipeline-event metrics pushed from CI jobs.
  # honor_labels=true preserves the per-event labels (env, commit, ci_system).
  - job_name: prometheus-pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - prometheus-pushgateway:9091
    scrape_interval: 15s

  # ── Optional: local LLM stack (docker-compose.local-llm.yml) ────────────────
  # Uncomment when running the local-llm overlay. The grafana dashboards
  # vllm.json, ollama.json, and anthropic-cost.json query these jobs.
  #
  # - job_name: ollama
  #   static_configs:
  #     - targets: ['ollama:11434']
  #   metrics_path: /metrics
  #
  # - job_name: litellm
  #   static_configs:
  #     - targets: ['litellm:4000']
  #   metrics_path: /metrics
  #
  # - job_name: vllm
  #   static_configs:
  #     - targets: ['vllm:8000']
  #   metrics_path: /metrics
