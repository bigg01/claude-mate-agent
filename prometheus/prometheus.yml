global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/dora_rules.yml

scrape_configs:
  - job_name: claude-mate-agent
    static_configs:
      - targets:
          - agent:8080
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Pushgateway holds DORA + pipeline-event metrics pushed from CI jobs.
  # honor_labels=true preserves the per-event labels (env, commit, ci_system).
  - job_name: prometheus-pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - prometheus-pushgateway:9091
    scrape_interval: 15s
