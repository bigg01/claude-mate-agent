{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "claude-mate-agent.fullname" . }}
  labels:
    {{- include "claude-mate-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "claude-mate-agent.fullname" . }}
  labels:
    {{- include "claude-mate-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "claude-mate-agent.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "claude-mate-agent.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
