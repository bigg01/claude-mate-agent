{{- if and .Values.vault.enabled .Values.vault.secretsOperator.enabled -}}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "claude-mate-agent.fullname" . }}
  labels:
    {{- include "claude-mate-agent.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ required "vault.secretsOperator.vaultAuthRef is required when vault.secretsOperator.enabled=true" .Values.vault.secretsOperator.vaultAuthRef | quote }}
  mount: {{ .Values.vault.secretsOperator.mount | quote }}
  type: {{ .Values.vault.secretsOperator.type | quote }}
  path: {{ required "vault.secretsOperator.path is required when vault.secretsOperator.enabled=true" .Values.vault.secretsOperator.path | quote }}
  refreshAfter: {{ .Values.vault.secretsOperator.refreshAfter | quote }}
  destination:
    create: true
    name: {{ include "claude-mate-agent.vaultSecretName" . }}
    type: {{ .Values.vault.secretsOperator.secretType }}
  {{- with .Values.vault.secretsOperator.rolloutRestartTargets }}
  rolloutRestartTargets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
