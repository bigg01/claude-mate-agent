{{- if and .Values.sandbox.enabled .Values.sandbox.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "claude-mate-agent.fullname" . }}-sandbox
  labels:
    {{- include "claude-mate-agent.labels" . | nindent 4 }}
    claude-mate.io/sandbox: "true"
spec:
  podSelector:
    matchLabels:
      {{- include "claude-mate-agent.selectorLabels" . | nindent 6 }}
      claude-mate.io/sandbox: "true"
  policyTypes:
    - Ingress
    - Egress
  # Sandbox Jobs never accept inbound traffic.
  ingress: []
  egress:
    {{- toYaml .Values.sandbox.networkPolicy.egress | nindent 4 }}
{{- end }}
