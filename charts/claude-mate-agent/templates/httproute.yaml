{{- if and .Values.gateway.enabled (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1/HTTPRoute") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "claude-mate-agent.fullname" . }}
  labels:
    {{- include "claude-mate-agent.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- if .Values.gateway.createGateway }}
    - name: {{ include "claude-mate-agent.fullname" . }}
    {{- else }}
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
    {{- end }}
  {{- if .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml .Values.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "claude-mate-agent.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
