{{- if .Values.sandbox.enabled }}
{{- if not .Values.sandbox.task }}
{{- fail "sandbox.task must be set when sandbox.enabled=true" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  generateName: {{ include "claude-mate-agent.fullname" . }}-sandbox-
  labels:
    {{- include "claude-mate-agent.labels" . | nindent 4 }}
    claude-mate.io/sandbox: "true"
    claude-mate.io/team-mate-role: {{ .Values.sandbox.teamMateRole | quote }}
spec:
  ttlSecondsAfterFinished: {{ .Values.sandbox.ttlSecondsAfterFinished }}
  activeDeadlineSeconds: {{ .Values.sandbox.maxDurationSeconds }}
  backoffLimit: {{ .Values.sandbox.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "claude-mate-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sandbox
        claude-mate.io/sandbox: "true"
        claude-mate.io/team-mate-role: {{ .Values.sandbox.teamMateRole | quote }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $openshell := .Values.sandbox.openshell }}
      annotations:
        claude-mate.io/sandbox: "true"
        {{- if .Values.auditAnnotations.enabled }}
        {{- toYaml .Values.auditAnnotations.annotations | nindent 8 }}
        {{- end }}
        {{- if $openshell.enabled }}
        {{- toYaml $openshell.annotations | nindent 8 }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "claude-mate-agent.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- if $openshell.enabled }}
      runtimeClassName: {{ $openshell.runtimeClassName }}
      {{- else if .Values.sandbox.runtimeClassName }}
      runtimeClassName: {{ .Values.sandbox.runtimeClassName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: claude-mate-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--once"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: OPERATING_MODE
              value: "sandbox"
            - name: TEAM_MATE_ROLE
              value: {{ .Values.sandbox.teamMateRole | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONTAINER_NAME
              value: claude-mate-agent
            - name: REMOTE_LOG_SYNC_ENABLED
              value: {{ .Values.audit.remoteLogSyncEnabled | quote }}
            - name: REMOTE_LOG_DESTINATION
              value: {{ .Values.audit.destination | quote }}
            - name: OTEL_ENABLED
              value: {{ .Values.otel.enabled | quote }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "claude-mate-agent.fullname" . }}-sandbox
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),claude.sandbox=true"
            {{- end }}
            - name: PERSONAS_DIR
              value: {{ .Values.persona.personasDir | quote }}
            - name: CLAUDE_TIMEOUT_SECONDS
              value: {{ .Values.sandbox.maxDurationSeconds | quote }}
            - name: CLAUDE_TASK
              value: {{ .Values.sandbox.task | quote }}
            - name: WORK_DIR
              value: {{ .Values.sandbox.workspace.mountPath | quote }}
            {{- if .Values.claudeCode.baseUrl }}
            - name: ANTHROPIC_BASE_URL
              value: {{ .Values.claudeCode.baseUrl | quote }}
            {{- end }}
            {{- if .Values.claudeCode.apiVersion }}
            - name: ANTHROPIC_API_VERSION
              value: {{ .Values.claudeCode.apiVersion | quote }}
            {{- end }}
            {{- if .Values.claudeCode.apiKeySecretName }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.claudeCode.apiKeySecretName }}
                  key: {{ .Values.claudeCode.apiKeySecretKey }}
            {{- end }}
            {{- include "claude-mate-agent.guardrailsEnv" . | nindent 12 }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.sandbox.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: workspace
              mountPath: {{ .Values.sandbox.workspace.mountPath }}
            {{- if and $openshell.enabled $openshell.policyConfigMap }}
            - name: openshell-policy
              mountPath: {{ $openshell.policyMountPath }}
              subPath: policy.yaml
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and $openshell.enabled $openshell.policyConfigMap }}
        - name: openshell-policy
          configMap:
            name: {{ $openshell.policyConfigMap }}
            items:
              - key: policy.yaml
                path: policy.yaml
        {{- end }}
        - name: workspace
          {{- if .Values.sandbox.workspace.storageClass }}
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: {{ .Values.sandbox.workspace.storageClass }}
                resources:
                  requests:
                    storage: {{ .Values.sandbox.workspace.size }}
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.sandbox.workspace.size }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
