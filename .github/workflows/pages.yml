name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Required by actions/deploy-pages — the workflow gets a short-lived OIDC token
# that the Pages deployment exchanges for write access. Defaults are read-only
# so we restate them explicitly.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight Pages deployment at a time. cancel-in-progress=false so a
# running deploy completes before the next one starts (avoids leaving the site
# in a half-deployed state).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt JS actions into Node 24 ahead of the 2026-06-02 deprecation cutover.
  # Safe to remove once Node 24 is default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs and theme
        run: pip install -r docs/requirements.txt

      - name: Build site (strict)
        run: mkdocs build --strict --site-dir site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # Pages must be enabled once on the repo before this workflow can deploy.
        # The default GITHUB_TOKEN lacks the scope to enable it, so do it once with:
        #   gh api -X POST /repos/OWNER/REPO/pages -f build_type=workflow
        # (or click Settings → Pages → Source: GitHub Actions).

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
