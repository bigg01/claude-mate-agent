name: Security

# Runs CVE, SAST, secret, and SBOM scans on every push and PR.
# Results upload to GitHub Code Scanning (SARIF) so findings appear on the
# Security tab and block merges via branch protection.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Weekly re-scan picks up newly disclosed CVEs against the same code.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write   # required for SARIF upload
  actions: read

env:
  # Opt JS actions into Node 24 ahead of the 2026-06-02 deprecation cutover.
  # Safe to remove once Node 24 is default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trivy-filesystem:
    name: Trivy — dependencies & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-fs.sarif
          scanners: vuln,secret

      - name: Upload Trivy fs results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-config:
    name: Trivy — IaC (Dockerfile, Helm, manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trivy IaC config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-config.sarif

      - name: Upload Trivy config results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  trivy-image:
    name: Trivy — container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: claude-mate-agent:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: claude-mate-agent:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-image.sarif
          exit-code: '1'

      - name: Upload Trivy image results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Generate SBOM (CycloneDX)
        if: always()
        uses: anchore/sbom-action@v0
        with:
          image: claude-mate-agent:scan
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

  bandit:
    name: Bandit — Python SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Bandit
        run: pip install --no-cache-dir 'bandit[toml,sarif]>=1.7'

      - name: Run Bandit
        run: |
          bandit -r container/app.py \
            -c container/pyproject.toml \
            -f sarif -o bandit.sarif || true

      - name: Upload Bandit results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

  semgrep:
    name: Semgrep — multi-language SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config p/ci \
            --config p/security-audit \
            --config p/dockerfile \
            --config p/kubernetes \
            --sarif --output=semgrep.sarif || true

      - name: Upload Semgrep results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: Gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # gitleaks scans full history

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
