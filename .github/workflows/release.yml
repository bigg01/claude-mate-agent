name: Release

# Triggered by SemVer tag push. Verifies all version artefacts agree, packages
# the Helm chart, creates a GitHub Release with auto-generated notes, and
# attaches the chart tarball + SBOM. The container image build/push is handled
# by ci.yml (which also triggers on tag push).

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write   # required for GitHub Release creation
  packages: write   # required for OCI chart push to GHCR

env:
  HELM_VERSION: "3.15.4"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify version consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Derive version from tag
        id: derive
        run: |
          REF="${GITHUB_REF##*/}"
          [[ -n "${{ github.event.inputs.tag }}" ]] && REF="${{ github.event.inputs.tag }}"
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # SemVer pre-release marker: any '-' in the version string
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing version: $VERSION"

      - name: Verify VERSION file matches tag
        run: |
          FILE=$(tr -d '[:space:]' < VERSION)
          if [[ "$FILE" != "${{ steps.derive.outputs.version }}" ]]; then
            echo "::error::VERSION file ($FILE) disagrees with tag (${{ steps.derive.outputs.version }})."
            echo "Run scripts/bump-version.sh ${{ steps.derive.outputs.version }} and commit before tagging."
            exit 1
          fi

      - name: Verify Chart.yaml matches tag
        run: |
          CHART_VER=$(awk '/^version:/ {print $2}' charts/claude-mate-agent/Chart.yaml)
          APP_VER=$(awk '/^appVersion:/ {gsub(/"/,""); print $2}' charts/claude-mate-agent/Chart.yaml)
          for v in "$CHART_VER" "$APP_VER"; do
            if [[ "$v" != "${{ steps.derive.outputs.version }}" ]]; then
              echo "::error::Chart.yaml ($v) disagrees with tag."
              exit 1
            fi
          done

      - name: Verify pyproject.toml matches tag
        run: |
          PY_VER=$(awk -F\" '/^version =/ {print $2}' container/pyproject.toml)
          if [[ "$PY_VER" != "${{ steps.derive.outputs.version }}" ]]; then
            echo "::error::pyproject.toml ($PY_VER) disagrees with tag."
            exit 1
          fi

  package-chart:
    name: Package + publish Helm chart
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm package
        run: |
          helm package charts/claude-mate-agent \
            --version "${{ needs.verify.outputs.version }}" \
            --app-version "${{ needs.verify.outputs.version }}" \
            --destination .

      - name: Push to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin
          helm push "claude-mate-agent-${{ needs.verify.outputs.version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: claude-mate-agent-*.tgz
          retention-days: 365

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, package-chart]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history for autogenerated release notes

      - uses: actions/download-artifact@v4
        with:
          name: helm-chart

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" \
            | grep -v "${{ github.ref_name }}" | head -1 || echo "")
          {
            echo "## What changed"
            echo ""
            if [[ -n "$PREV_TAG" ]]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${{ github.ref_name }}"
            else
              git log --pretty=format:"- %s (%h)" "${{ github.ref_name }}"
            fi
            echo ""
            echo ""
            echo "## Artefacts"
            echo ""
            echo "- Container image: \`ghcr.io/${{ github.repository }}/claude-mate-agent:${{ needs.verify.outputs.version }}\`"
            echo "- Helm chart: \`oci://ghcr.io/${{ github.repository_owner }}/charts/claude-mate-agent:${{ needs.verify.outputs.version }}\`"
          } > RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.verify.outputs.version }}"
          prerelease: ${{ needs.verify.outputs.prerelease == 'true' }}
          body_path: RELEASE_NOTES.md
          files: |
            claude-mate-agent-*.tgz
