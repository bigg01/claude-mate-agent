# Docker Compose override — fully local LLM stack for laptop development.
# Brings up Ollama (model server) + LiteLLM (Anthropic↔OpenAI translator) and
# wires the agent to use them. Zero external API calls — works air-gapped.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local-llm.yml up --build
#   # Pull a model the first time (one-shot):
#   docker compose -f docker-compose.yml -f docker-compose.local-llm.yml \
#     exec ollama ollama pull llama3.1:8b
#
# Architecture:
#   agent  ──Anthropic API──▶  litellm:4000/anthropic  ──OpenAI API──▶  ollama:11434
#
# To swap Ollama for LM Studio running on the host:
#   1. Start LM Studio's Local Server on port 1234
#   2. Edit litellm/config.yaml: api_base: http://host.docker.internal:1234/v1
#   3. Remove the ollama service below if you don't need both

services:
  agent:
    environment:
      ANTHROPIC_BASE_URL: "http://litellm:4000/anthropic"
      ANTHROPIC_API_KEY: "sk-litellm-local"   # virtual key — litellm ignores it
    depends_on:
      litellm:
        condition: service_healthy

  ollama:
    image: docker.io/ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Uncomment for NVIDIA GPU passthrough (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: "sk-litellm-local"
      OLLAMA_API_BASE: "http://ollama:11434"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health/liveliness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  ollama-models: {}
