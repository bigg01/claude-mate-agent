# Docker Compose override — fully local LLM stack for laptop development.
# Brings up Ollama (model server) + LiteLLM (Anthropic↔OpenAI translator) and
# wires the agent to use them. Zero external API calls — works air-gapped.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local-llm.yml up --build
#   # Pull a model the first time (one-shot):
#   docker compose -f docker-compose.yml -f docker-compose.local-llm.yml \
#     exec ollama ollama pull llama3.1:8b
#
# Architecture:
#   agent  ──Anthropic API──▶  litellm:4000/anthropic  ──OpenAI API──▶  ollama:11434
#
# To swap Ollama for LM Studio running on the host:
#   1. Start LM Studio's Local Server on port 1234
#   2. Edit litellm/config.yaml: api_base: http://host.docker.internal:1234/v1
#   3. Remove the ollama service below if you don't need both
#
# Podman note: a user-defined `networks:` block is required when running this
# stack via `podman compose` backed by legacy docker-compose v1. Without it,
# v1 translates `depends_on` into deprecated --link flags that podman rejects
# with "bad parameter: link is not supported". Attaching every service to an
# explicit network suppresses that translation.

networks:
  cm-local-llm:
    driver: bridge

services:
  agent:
    environment:
      ANTHROPIC_BASE_URL: "http://litellm:4000/anthropic"
      ANTHROPIC_API_KEY: "sk-litellm-local"   # virtual key — litellm ignores it
    networks:
      - default        # keep default so prometheus / grafana from the base stack still reach the agent
      - cm-local-llm
    depends_on:
      # service_started (not service_healthy) — the agent's HTTP server boots
      # independently of litellm; an actual LLM call retries on its own if
      # litellm isn't ready yet. Avoids brittle healthcheck coupling.
      litellm:
        condition: service_started

  ollama:
    image: docker.io/ollama/ollama:latest
    networks:
      - cm-local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Uncomment for NVIDIA GPU passthrough (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    networks:
      - cm-local-llm
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: "sk-litellm-local"
      OLLAMA_API_BASE: "http://ollama:11434"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      # Use python (always present in the litellm image) instead of wget,
      # which isn't installed in the slim base. /health/liveliness returns 200
      # as soon as the server can accept connections.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  ollama-models: {}
